apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.io
spec:
  project: default
  sources:
  - repoURL: registry-1.docker.io/bitnamicharts
    chart: postgresql
    targetRevision: "18.x"
    helm:
      valueFiles:
      - $values/values/postgres.yaml
  - repoURL: https://github.com/jimil09/gitops-sonarqube-demo
    targetRevision: HEAD
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube-dce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
