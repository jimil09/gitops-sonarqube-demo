applicationNodes:
  replicaCount: 2

  # Fix: wait for headless service DNS before SonarQube starts.
  # sonar.cluster.hosts resolves at startup via InetAddress.getByName(); if
  # CoreDNS hasn't propagated the endpoint yet the validation throws and the
  # pod enters CrashLoopBackOff. The init container holds startup until DNS
  # resolves (publishNotReadyAddresses=true on the headless svc means the pod's
  # own IP is included even while init containers run).
  extraInitContainers:
  - name: wait-for-headless-dns
    image: busybox:1.28
    command:
    - sh
    - -c
    - |
      echo "Waiting for headless service DNS to resolve..."
      until nslookup sonarqube-sonarqube-dce-headless; do
        echo "Not yet, retrying in 3s..."
        sleep 3
      done
      echo "DNS ready."

  jwtSecret: "hW+y4kiwHQJRRarQk+w0095ljMhYqPWOB6hTrlcZ3ea2N8bLxdzrUhHZHu9bhRVVpR1hAv8W4YhDgBycvWlxQA=="

  prometheusMonitoring:
    podMonitor:
      enabled: false

searchNodes:
  replicaCount: 3

